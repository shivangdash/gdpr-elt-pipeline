gdpr_elt_pipeline:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      user: "{{ env_var('POSTGRES_USER', 'gdpr_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'gdpr_password') }}"
      port: "{{ env_var('POSTGRES_PORT', 5432) | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'gdpr') }}"
      schema: analytics
      threads: 4
